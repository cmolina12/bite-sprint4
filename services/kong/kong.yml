_format_version: "3.0"
_transform: true

# =============================================================================
# Kong Declarative Configuration - BITE.co Sprint 3
# =============================================================================
# Tácticas implementadas:
#   1. Health Checks (ASR-DISP-01): Kong consulta /health cada 5s sobre las 3
#      EC2 del Manejador de Reportes a través del ALB. Si una instancia no
#      responde, Kong la marca como unhealthy y deja de enviarle tráfico.
#
#   2. Circuit Breaker (ASR-DISP-02): si el % de instancias healthy cae bajo
#      el umbral, Kong activa el "circuit" — responde con mensaje de
#      degradación controlada en lugar de pasar el request a un upstream caído.
# =============================================================================

services:
  - name: reportes-service
    # El host se resuelve al ALB. Kong va a hacer health checks DIRECTOS sobre
    # las IPs del Target Group, no sobre el ALB. Esto se logra con upstream.
    host: reportes-upstream
    port: 80
    protocol: http
    connect_timeout: 5000
    write_timeout: 10000
    read_timeout: 10000
    retries: 1

    routes:
      - name: reportes-route
        paths:
          - /
        strip_path: false
        preserve_host: false

# =============================================================================
# Upstream — donde se configuran los health checks reales
# =============================================================================
# El upstream tiene UN solo target: el DNS del ALB. Kong va a hacer health
# checks contra ese target. Si el ALB devuelve 5xx o no responde, Kong
# considera el upstream caído.
#
# IMPORTANTE: en producción se configurarían múltiples targets (las IPs
# directas de las EC2) para que Kong haga balanceo + circuit breaker a nivel
# de instancia individual. En este lab, el ALB ya hace balanceo, y Kong hace
# health checks contra el conjunto. Si quisiéramos circuit breaker por
# instancia, tendríamos que listar IPs directas o usar service discovery,
# que complica el setup sin agregar valor pedagógico al Sprint.
# =============================================================================
upstreams:
  - name: reportes-upstream
    algorithm: round-robin

    targets:
      # PLACEHOLDER: este valor se reemplaza en runtime con el DNS del ALB
      # por el script generate-kong-config.sh antes de arrancar Kong.
      - target: __ALB_HOST__:80
        weight: 100

    healthchecks:
      # -----------------------------------------------------------------------
      # Active Health Checks — TÁCTICA 1 del Sprint 3 (ASR-DISP-01)
      # Kong envía una request HTTP GET /health cada 5 segundos
      # -----------------------------------------------------------------------
      active:
        type: http
        http_path: /health
        timeout: 3
        concurrency: 2
        healthy:
          interval: 5            # cada 5 segundos cuando está sano
          successes: 2           # 2 successes seguidos para marcar healthy
          http_statuses:
            - 200
            - 302
        unhealthy:
          interval: 5            # cada 5 segundos cuando está enfermo
          http_failures: 2       # 2 fallas seguidas para marcar unhealthy
          tcp_failures: 2
          timeouts: 2
          http_statuses:
            - 429
            - 500
            - 502
            - 503
            - 504

      # -----------------------------------------------------------------------
      # Passive Health Checks (Circuit Breaker) — TÁCTICA 2 (ASR-DISP-02)
      # Si en una ventana de tráfico real falla N veces, Kong abre el circuito
      # -----------------------------------------------------------------------
      passive:
        type: http
        healthy:
          successes: 5
          http_statuses:
            - 200
            - 201
            - 202
            - 203
            - 204
        unhealthy:
          http_failures: 3       # 3 fallas seguidas = circuit OPEN
          tcp_failures: 3
          timeouts: 3
          http_statuses:
            - 500
            - 502
            - 503
            - 504

# =============================================================================
# Plugins globales
# =============================================================================
plugins:
  # ---------------------------------------------------------------------------
  # Request-Termination — fallback cuando el upstream está caído
  # NOTA: Este plugin NO se aplica como global. Cuando todos los targets están
  # unhealthy, Kong devuelve 503 automáticamente. El "mensaje de degradación
  # controlada" que menciona la táctica es ese 503 con body custom — Kong lo
  # configura automáticamente cuando upstream.healthchecks.threshold se viola.
  # ---------------------------------------------------------------------------

  # ---------------------------------------------------------------------------
  # CORS — para que JMeter/Postman/curl puedan hacer requests sin problemas
  # ---------------------------------------------------------------------------
  - name: cors
    config:
      origins:
        - "*"
      methods:
        - GET
        - POST
        - PUT
        - DELETE
        - OPTIONS
      headers:
        - Accept
        - Authorization
        - Content-Type
      exposed_headers:
        - X-Kong-Upstream-Latency
        - X-Kong-Proxy-Latency
      credentials: false
      max_age: 3600
